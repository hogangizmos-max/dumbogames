<!DOCTYPE html>
<html>
<head>
    <title>JS BoxGuns</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
            margin: auto;
        }
    </style>
</head>

<body>

<canvas id="game" width="1800" height="1000"></canvas>

<script>

var format = [16, 16]

function Generate(surface) {
  var bombs = 0
  for (const [index, i] of surface.entries()) {
    if (RandomRandint(1, 3) === 1 && bombs < 20) {
      bombs += 1
      surface[index] = 1
    }
  }
  return surface
}

let mouse = {
  x: 0,
  y: 0,
  down: false
};

function RandomRandint(min, max) {return Math.floor(Math.random() * (max - min + 1)) + min;}

var board = Generate(Array(format[0] * format[1]).fill(0));

var discovered = board

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.addEventListener("mousedown", () => {
    mouse.down = true;
});

canvas.addEventListener("mouseup", () => {
    mouse.down = false;
});

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

document.addEventListener("keydown", e => {
    const key = e.key;
});

function Game() {
  ctx.fillStyle = "rgb(50, 50, 50)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const [x, i] of Array(16).entries()) {
    for (const [y, i] of Array(16).entries()) {
      if (board[x * 16 + y] === 1) ctx.fillStyle = "rgb(100, 0, 0)"; else ctx.fillStyle = "rgb(100, 100, 100)"; 
      ctx.fillRect(x * 50 + 2, y * 50 + 2, 46, 46)
    }
  }
  
  requestAnimationFrame(Game)
}
Game()

</script>

</body>
</html>
