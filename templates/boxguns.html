<!DOCTYPE html>
<html>
<head>
    <title>JS BoxGuns</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
            margin: auto;
        }
    </style>
</head>

<body>

<canvas id="game" width="1800" height="900"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mouse = {
    x: 0,
    y: 0,
    down: false
};

let player = { x: 900, y: 450, size: 80 };
let keys = {};

var backgroundcolor = { r: 100, g: 0, b: 0 };
var gamerunning = 0;

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("mousedown", () => {
    mouse.down = true;
});

canvas.addEventListener("mouseup", () => {
    mouse.down = false;
});

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

function Game() {
    function update() {
        if (keys["w"] && player.y > 0) player.y -= 4;
        if (keys["s"] && player.y < 900 - player.size) player.y += 4;
        if (keys["a"] && player.x > 0) player.x -= 4;
        if (keys["d"] && player.x < 1800 - player.size) player.x += 4;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "blue";
        ctx.fillRect(player.x, player.y, player.size, player.size);
    }

    update();
    draw();
}

function Menu() {
    ctx.fillStyle = `rgb(${backgroundcolor.r}, ${backgroundcolor.g}, ${backgroundcolor.b})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = "40px Arial";
    ctx.fillStyle = "black";

    ctx.fillText("JS BoxGuns", 100, 100);

    ctx.fillStyle = "red";
    ctx.fillRect(200, 200, 250, 50);

    ctx.fillStyle = "black";
    ctx.fillText("Play", 280, 238);

    if (
        mouse.down &&
        mouse.x >= 200 &&
        mouse.x <= 450 &&
        mouse.y >= 200 &&
        mouse.y <= 250
    ) {
        gamerunning = 1;
    }
}

function loop() {
    if (gamerunning === 1) {
        Game();
    } else {
        Menu();
    }

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
